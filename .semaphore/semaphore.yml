version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Build and Push Image
    dependencies: []
    task:
      jobs:
        - name: build
          commands:
            - checkout
            - cd 1-deployment
            - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            - 'docker build -t $DOCKER_USERNAME/my-flask-image:latest .'
            - 'docker push $DOCKER_USERNAME/my-flask-image:latest'
      secrets:
        - name: docker-uradujko
  - name: Deploy to Kubernetes
    dependencies:
      - Build and Push Image
    task:
      jobs:
        - name: K8S
          commands:
            - checkout
            - mkdir -p ~/.kube
            - 'wget https://gist.githubusercontent.com/TomFern/c6121c6d7fd72faeb5b7cf0ce5a0e002/raw/9e86a4ca3ac8c8df6aa34cc661f1410711aef8bd/config -O ~/.kube/config'
            - cd 2-blue-green-deployment
            - kubectl create namespace "g1" || true
            - kubectl config set-context --current --namespace="g1"
            - kubectl apply -f deployment-blue.yml
            - kubectl apply -f service-blue.yml
            - kubectl rollout status deployment/flask-app-blue
      secrets:
        - name: kubeconfig
  - name: Verify
    dependencies:
      - Deploy to Kubernetes
    task:
      jobs:
        - name: Verify
          commands:
            - checkout
            - kubectl config set-context --current --namespace="g1"
            - kubectl get svc flask-app
      secrets:
        - name: kubeconfig
